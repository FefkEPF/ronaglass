<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Rona Auto Glass - Ankara Etimesgut'ta oto cam değişimi, cam tamiri, tuning cam ve daha fazlası. Sözleşmeli sigorta kabul eden profesyonel oto cam servisi.">
    <title>Rona Auto Glass | Oto Cam Değişimi & Tamiri - Ankara</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loader -->
    <div class="loader" id="loader">
        <div class="loader-inner">
            <div class="logo-text" style="font-size:24px;margin-bottom:20px;letter-spacing:8px;font-weight:200;">RONA</div>
            <div class="loader-bar"><div class="loader-progress" id="loader-progress"></div></div>
            <p class="loader-text">Deneyim Yükleniyor</p>
        </div>
    </div>

    <!-- Navbar -->
    <div class="nav-trigger"></div>
    <nav class="navbar" id="navbar">
        <a href="#home" class="logo-img"><img src="images/logo.png" alt="Rona Auto Glass"></a>
        <ul class="nav-links">
            <li><a href="#home" class="nav-link active">Ana Sayfa</a></li>
        </ul>
        <div class="nav-right">
            <a href="tel:+905346943789" class="nav-phone" style="color:var(--text);text-decoration:none;font-size:13px;letter-spacing:1px;">0534 694 37 89</a>
            <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobile-menu">
        <ul>
            <li><a href="#home" class="mobile-link">Ana Sayfa</a></li>
        </ul>
    </div>

    <!-- ==================== CINEMATIC SCROLL IMAGE SEQUENCE ==================== -->
    <section id="home" class="cinema-section">
        <div class="cinema-sticky" id="cinema-sticky">
            <canvas id="cinema-canvas" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;background:#000;"></canvas>
            <div class="cinema-overlay"></div>
            <div class="cinema-progress-bar"><div class="cinema-progress-fill" id="cinema-progress-fill"></div></div>

            <div class="cinema-scroll-hint" id="cinema-scroll-hint">
                <div class="cinema-mouse"><div class="cinema-mouse-dot"></div></div>
                <span>Aşağı Kaydır</span>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-bottom"><p>&copy; 2025 Rona Auto Glass. Tüm Hakları Saklıdır.</p></div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
